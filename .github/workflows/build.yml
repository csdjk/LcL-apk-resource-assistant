name: build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
      - name: Test, publish and package
        shell: pwsh
        run: .\scripts\build-release.ps1
      - uses: actions/upload-artifact@v7
        with:
          name: ApkResourceAssistant-win-x64
          path: |
            .\artifacts\ApkResourceAssistant.exe
            .\artifacts\ApkResourceAssistant-v4.0.0-win-x64.zip
            .\artifacts\ApkResourceAssistant-v4.0.0-SHA256.txt
          if-no-files-found: error
